apiVersion: apps/v1
kind: Deployment
metadata:
  name: backlog-ui
  namespace: homelab-platform
  labels:
    app.kubernetes.io/name: backlog-ui
    app.kubernetes.io/part-of: homelab-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backlog-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backlog-ui
        app.kubernetes.io/part-of: homelab-platform
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backlog-ui
          image: ghcr.io/adamselir/backlog-ui:main@sha256:f141ec70b66011b6d3a7a59ad1e29037f0006083f3a2b029595e70cf01bab2fd
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            # Bind to 0.0.0.0 so the kubelet can run HTTP probes against pod IP.
            # NetworkPolicy is the real security boundary — no ingress rule
            # allows port 8000 from outside this pod (sidecar connects via
            # loopback 127.0.0.1:8000 at app layer).
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8000"
            - name: PLATFORM_BASE_URL
              # Public URL — homelab-platform sits behind CF Access, so reaching
              # it requires going through the tunnel + Access app (where the
              # service token policy lives). Cluster-internal Service URL would
              # bypass Access entirely.
              value: https://homelab-platform.amy-eli.com
            - name: REQUEST_TIMEOUT_S
              value: "5"
            - name: LOG_LEVEL
              value: INFO
          envFrom:
            # CF_ACCESS_CLIENT_ID + CF_ACCESS_CLIENT_SECRET — service-token
            # credentials for the `automation-backlog-ui` policy on the
            # homelab-platform Access app. Sealed at k8s/sealedsecret-platform.yaml.
            - secretRef:
                name: backlog-ui-platform
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: cf-access-proxy
          image: ghcr.io/adamselir/cf-access-proxy:0.2.3@sha256:8791f84263adcac687f84798f8fd2661381464981deb7937054673a0df42f74c
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 3001
          env:
            - name: CF_ACCESS_TEAM_DOMAIN
              value: amy-eli.cloudflareaccess.com
            - name: CF_ACCESS_AUD
              # CF Access app `backlog-ui` (id fe5b8ff5-1317-44bc-833e-67fc10ce5a93)
              value: df8721cc73d6043190118f4239d2cf792d51ca6fdb7214a70e4f2da17b478484
            - name: UPSTREAM_URL
              value: http://127.0.0.1:8000
            - name: LISTEN_PORT
              value: "3001"
            - name: SKIP_PATHS
              value: /healthz,/readyz,/metrics
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
      volumes:
        - name: tmp
          emptyDir: {}
      dnsConfig:
        options:
          - name: ndots
            value: "2"
