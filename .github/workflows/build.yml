name: Build and Push

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        run: pip install "poetry==2.3.3"
      - name: Install deps
        run: poetry install
      - name: Lint (black + isort)
        run: |
          poetry run black --check .
          poetry run isort --check .
      - name: Run tests
        run: poetry run pytest app/tests -v

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: docker build -t scan:pr .
      - name: Trivy scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.55.0 image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              scan:pr

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/adamselir/backlog-ui:main
            ghcr.io/adamselir/backlog-ui:${{ github.sha }}
